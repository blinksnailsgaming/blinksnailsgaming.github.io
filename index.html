<style>

/* -------------------- ROSE GOLD FUTURISTIC THEME -------------------- */

:root {
  --bg-main: #050308;
  --bg-card: rgba(20, 10, 25, 0.85);
  --accent-rose-gold: #f7c6b7;
  --accent-rose-deep: #ff9bbf;
  --text-main: #fdf5ff;
}

body {
  background: radial-gradient(circle at top, #3b1a2f 0%, #050308 45%, #000000 100%);
  color: var(--text-main);
  font-family: "Poppins", sans-serif;
  margin: 0;
  padding: 0;
}

/* -------------------- HEADER -------------------- */

.hero-header {
  width: 100%;
  padding: 24px 0 10px;
  background: radial-gradient(circle at top, #3b1a2f 0%, #050308 55%, #000000 100%);
  border-bottom: 1px solid rgba(247,198,183,0.35);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  position: sticky;
  top: 0;
  z-index: 50;
}

.hero-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px;
  text-align: center;
}

.hero-title {
  font-size: 2.2rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: #f7c6b7;
  text-shadow: 0 0 18px rgba(255,155,191,0.9);
}

.hero-subtitle {
  margin-top: 6px;
  font-size: 0.9rem;
  color: #ffdde9;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.hero-nav {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.hero-nav a {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid rgba(247,198,183,0.6);
  color: #fdf5ff;
  text-decoration: none;
  background: rgba(10, 5, 15, 0.8);
  transition: 0.2s ease;
}

.hero-nav a:hover {
  background: linear-gradient(135deg, #f7c6b7, #ff9bbf);
  color: #050308;
  box-shadow: 0 0 18px rgba(255,155,191,0.8);
}

/* -------------------- SECTIONS -------------------- */

section {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  background: linear-gradient(135deg, rgba(247,198,183,0.08), rgba(255,155,191,0.03));
  border-radius: 18px;
  border: 1px solid rgba(247,198,183,0.35);
  box-shadow: 0 0 25px rgba(247,198,183,0.18);
}

h2 {
  color: var(--accent-rose-gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* -------------------- PHOTOCARDS -------------------- */

.photocard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.photocard {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid rgba(247,198,183,0.5);
  box-shadow: 0 0 18px rgba(255,155,191,0.35);
  transition: 0.2s ease;
  text-align: center;
  padding: 10px;
}

.photocard img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
}

.photocard:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 28px rgba(255,155,191,0.6);
}

.photocard p {
  margin-top: 10px;
  color: #ffb7e5;
  font-weight: 600;
}

/* -------------------- KPOP SUBTITLES -------------------- */

.kpop-sub {
  font-size: 1rem;
  color: #ffb7e5;
  text-shadow: 0 0 8px rgba(255, 105, 180, 0.8);
  font-weight: 600;
  opacity: 0;
  animation: subtitleFade 1.5s ease forwards;
  margin: 12px 0;
}

@keyframes subtitleFade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
